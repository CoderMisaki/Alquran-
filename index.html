<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Qur'an Indonesia</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.alquran.cloud https://raw.githubusercontent.com; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests;">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/style.css">

</head>
<body>

    <header id="main-header">
        <div class="logo arabic-logo" aria-label="Al-Qur'an Karim">
            <span class="logo-text">القرآن الكريم</span>
        </div>
        <div class="header-controls">
            <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Ganti mode tema" title="Ganti tema terang/gelap">
                <span class="theme-icon theme-sun" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.4M12 19.1v2.4M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.9 19.1l1.7-1.7M17.4 6.6l1.7-1.7"/></svg>
                </span>
                <span class="theme-icon theme-moon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M20 14.4A8.8 8.8 0 1 1 9.6 4 7 7 0 1 0 20 14.4z"/></svg>
                </span>
            </button>
            <div class="header-right" id="header-right">
            <button class="juz-filter-btn tap-effect" id="btn-open-juz" id="btn-open-juz">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            </button>
            <div class="search-container" id="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" class="search-input" placeholder="Cari nomor, nama surah, atau kata..." autocomplete="off">
                <div class="search-clear-btn hidden" id="search-clear" role="button" tabindex="0" >
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            </div>
            </div>
        </div>
    </header>

    <div id="reading-progress-container" class="progress-container">
        <div id="reading-progress-bar" class="progress-bar"></div>
    </div>

    <main>
        <div id="loader" class="loader-container fade-in-opacity">
            <div id="load">
              <div>G</div>
              <div>N</div>
              <div>I</div>
              <div>D</div>
              <div>A</div>
              <div>O</div>
              <div>L</div>
            </div>
        </div>

        <div id="view-list" class="hidden">
            
            <div id="continue-reading" class="continue-reading-card cr-card-effect hidden">
                <div class="cr-icon play-btn-large">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </div>
                <div class="cr-info">
                    <span class="cr-label">Lanjutkan Terakhir Dibaca</span>
                    <h3 id="cr-surah-name" class="cr-surah-name">Surah</h3>
                    <p id="cr-ayah-info" class="cr-ayah-info">Ayat</p>
                </div>
            </div>

            <div class="surah-grid" id="surah-grid"></div>
        </div>

        <div id="view-detail" class="hidden fade-in-opacity">
            
            <div class="sticky-back-wrapper">
                <div class="back-btn-ui" id="back-btn-ui">
                    <button class="back-main-btn tap-effect" id="btn-back-main">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                        <span>Kembali</span>
                    </button>
                    <button class="back-toggle-btn tap-effect" id="btn-back-toggle">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                </div>
            </div>

            <div class="detail-tools-row">
                <button class="nav-surah-btn tap-effect" id="btn-prev-surah" id="btn-prev-surah">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <button class="nav-surah-btn tap-effect" id="btn-next-surah" id="btn-next-surah">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>

                <button class="lock-btn tap-effect" id="lock-btn" id="lock-btn">
                    <svg id="icon-unlock" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
                    <svg id="icon-lock" class="hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </button>

                <div class="zoom-controls">
                    <button id="btn-zoom-out" class="zoom-btn tap-effect" type="button">A-</button>
                    <span class="zoom-value" id="zoom-value">30</span>
                    <button id="btn-zoom-in" class="zoom-btn tap-effect" type="button">A+</button>
                </div>
            </div>

            <div class="surah-header-detail" id="surah-header-detail"></div>
            <div class="ayah-list" id="ayah-list"></div>
        </div>
    </main>

    <div id="modal-lock" class="modal-overlay hidden">
        <div class="modal-box">
            <h3>Mode Hafalan</h3>
            <p>Masukkan rentang ayat yang ingin difokuskan.</p>
            <div class="input-group">
                <input type="number" id="input-start-ayah" placeholder="Awal" min="1" inputmode="numeric">
                <span>-</span>
                <input type="number" id="input-end-ayah" placeholder="Akhir" min="1" inputmode="numeric">
            </div>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel tap-effect" id="btn-cancel-lock">Batal</button>
                <button class="modal-btn btn-apply tap-effect" id="btn-apply-lock">Terapkan</button>
            </div>
        </div>
    </div>

    <div id="modal-juz" class="modal-overlay hidden">
        <div class="modal-box">
            <h3>Filter Juz</h3>
            <p>Pilih Juz untuk menampilkan surah terkait.</p>
            <div class="juz-grid" id="juz-grid-container"></div>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel tap-effect" id="btn-reset-juz">Hapus Filter</button>
                <button class="modal-btn btn-apply tap-effect" id="btn-close-juz">Tutup</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span id="toast-message"></span>
    </div>

    <script src="assets/js/app.js"></script>

</body>
</html>
